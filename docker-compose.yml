version: "3.9"

services:
  # ===== 预约服务 =====
  reservation:
    build:
      context: ./services/reservation
      dockerfile: Dockerfile
    image: ghcr.io/your-org/nekocafe-reservation:local
    container_name: nekocafe-reservation
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgresql://nekocafe:${POSTGRES_PASSWORD:-nekocafe}@postgres:5432/nekocafe_dev
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use-in-prod}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_SERVICE_NAME: reservation-svc
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===== 会员服务 =====
  member:
    build:
      context: ./services/member
      dockerfile: Dockerfile
    image: ghcr.io/your-org/nekocafe-member:local
    container_name: nekocafe-member
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgresql://nekocafe:${POSTGRES_PASSWORD:-nekocafe}@postgres:5432/nekocafe_dev
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use-in-prod}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_SERVICE_NAME: member-svc
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===== API 网关（Nginx）=====
  api-gateway:
    image: nginx:1.25-alpine
    container_name: nekocafe-gateway
    ports:
      - "8080:80"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - reservation
      - member
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: nekocafe-postgres
    environment:
      POSTGRES_USER: nekocafe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nekocafe}
      POSTGRES_DB: nekocafe_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nekocafe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: nekocafe-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===== OpenTelemetry Collector =====
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: nekocafe-otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./services/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # 自身指标
    depends_on:
      - tempo
      - loki

  # ===== Grafana =====
  grafana:
    image: grafana/grafana:10.4.0
    container_name: nekocafe-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  # ===== Prometheus =====
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nekocafe-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ===== Loki（日志）=====
  loki:
    image: grafana/loki:2.9.6
    container_name: nekocafe-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # ===== Tempo（链路追踪）=====
  tempo:
    image: grafana/tempo:2.4.1
    container_name: nekocafe-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./services/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
