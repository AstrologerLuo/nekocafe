global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 预约服务指标（otelcol 暴露自身指标）
  - job_name: 'otelcol'
    static_configs:
      - targets: ['otelcol:8888']

  # 会员服务指标（通过 otelcol 采集）
  - job_name: 'member-svc'
    static_configs:
      - targets: ['member:8080']

  # 预约服务指标
  - job_name: 'reservation-svc'
    static_configs:
      - targets: ['reservation:8080']
