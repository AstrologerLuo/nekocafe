worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 结构化访问日志（JSON 格式，方便 Loki 解析）
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"level":"INFO",'
            '"service":"api-gateway",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"duration_ms":$request_time,'
            '"upstream":"$upstream_addr",'
            '"trace_id":"$http_x_trace_id"'
        '}';

    access_log /dev/stdout json_combined;

    upstream reservation_svc {
        server reservation:8080;
        keepalive 32;
    }

    upstream member_svc {
        server member:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # 健康检查端点
        location /healthz {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # 预约服务路由
        location /api/v1/reservations/ {
            proxy_pass http://reservation_svc/api/v1/reservations/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Trace-Id $http_x_trace_id;

            # 超时配置
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 会员服务路由
        location /api/v1/members/ {
            proxy_pass http://member_svc/api/v1/members/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Trace-Id $http_x_trace_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 其余请求返回 404
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
