name: CD

on:
  push:
    branches: [main]        # 自动部署到 dev
    tags:
      - 'v*.*.*'            # 手动审批后部署到 staging/prod

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: ${{ github.repository_owner }}
  # 强制 GitHub Actions JavaScript actions 使用 Node.js 24（Node.js 20 将于 2026-09-16 停用）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===================================================================
  # JOB 1: 部署到 dev（main 分支自动触发）
  # ===================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: 检查 KUBECONFIG_DEV 是否配置
        id: check_kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG_DEV }}"
          if [ -z "$KUBECONFIG_SECRET" ] || [ "$KUBECONFIG_SECRET" == "placeholder" ]; then
            echo "⚠️ KUBECONFIG_DEV 未配置或为占位符，跳过 K8s 部署（本地 PoC 环境）"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (dev)
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Deploy to dev namespace (Helm + 金丝雀)
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          helm upgrade --install nekocafe-reservation ./helm/reservation \
            --namespace nekocafe-dev \
            --create-namespace \
            --set image.tag=$IMAGE_TAG \
            --set canary.enabled=true \
            --set canary.steps[0].setWeight=5 \
            --set canary.steps[1].pause.duration=2m \
            --set canary.steps[2].setWeight=25 \
            --set canary.steps[3].pause.duration=3m \
            --set canary.steps[4].setWeight=100 \
            --wait --timeout=10m

          helm upgrade --install nekocafe-member ./helm/member \
            --namespace nekocafe-dev \
            --set image.tag=$IMAGE_TAG \
            --set canary.enabled=true \
            --wait --timeout=10m

      - name: 运行烟雾测试
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          sleep 30
          DEV_URL=${{ secrets.DEV_SERVICE_URL }}
          curl -sf $DEV_URL/healthz || exit 1
          echo "Dev 烟雾测试通过 ✅"

      - name: 本地 PoC 说明
        if: steps.check_kubeconfig.outputs.skip_deploy == 'true'
        run: |
          echo "✅ 本次提交已通过 CI 测试（lint + test + build + scan）"
          echo "📝 K8s 部署需在 Settings → Secrets 中配置 KUBECONFIG_DEV 后自动生效"
          echo "🐳 镜像已推送至 GHCR: ghcr.io/${{ github.repository_owner }}/nekocafe-{reservation,member}"

  # ===================================================================
  # JOB 2: 部署到 staging（tag *-staging 触发，需要手动审批）
  # ===================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-staging')
    environment:
      name: staging
      url: https://staging.nekocafe.example.com
    steps:
      - uses: actions/checkout@v4

      - name: 检查 KUBECONFIG_STAGING 是否配置
        id: check_kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG_STAGING }}"
          if [ -z "$KUBECONFIG_SECRET" ] || [ "$KUBECONFIG_SECRET" == "placeholder" ]; then
            echo "⚠️ KUBECONFIG_STAGING 未配置，跳过 staging 部署"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (staging)
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig.yaml

      - name: Deploy to staging namespace
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          TAG=${{ github.ref_name }}

          helm upgrade --install nekocafe-reservation ./helm/reservation \
            --namespace nekocafe-staging \
            --create-namespace \
            --set image.tag=$TAG \
            --set canary.enabled=true \
            --set autoscaling.enabled=true \
            --wait --timeout=15m

          helm upgrade --install nekocafe-member ./helm/member \
            --namespace nekocafe-staging \
            --set image.tag=$TAG \
            --wait --timeout=15m

      - name: 运行集成测试
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          sleep 60
          STAGING_URL=${{ secrets.STAGING_SERVICE_URL }}
          curl -sf $STAGING_URL/healthz || exit 1
          echo "Staging 集成测试通过 ✅"

      - name: PoC 环境说明
        if: steps.check_kubeconfig.outputs.skip_deploy == 'true'
        run: |
          echo "✅ Staging 部署已跳过（KUBECONFIG_STAGING 未配置）"
          echo "📝 请在 Settings → Secrets 中配置后手动触发"

  # ===================================================================
  # JOB 3: 部署到 prod（正式 tag 触发，需要手动审批，蓝绿部署）
  # ===================================================================
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment:
      name: production
      url: https://nekocafe.example.com
    steps:
      - uses: actions/checkout@v4

      - name: 检查 KUBECONFIG_PROD 是否配置
        id: check_kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG_PROD }}"
          if [ -z "$KUBECONFIG_SECRET" ] || [ "$KUBECONFIG_SECRET" == "placeholder" ]; then
            echo "⚠️ KUBECONFIG_PROD 未配置，跳过 prod 部署"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (prod)
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig.yaml

      - name: 蓝绿部署到 prod
        if: steps.check_kubeconfig.outputs.skip_deploy == 'false'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          TAG=${{ github.ref_name }}

          # 部署 Green 版本
          helm upgrade --install nekocafe-reservation-green ./helm/reservation \
            --namespace nekocafe-prod \
            --create-namespace \
            --set image.tag=$TAG \
            --set deployment.slot=green \
            --set service.selector.slot=green \
            --wait --timeout=15m

          # 烟雾测试 Green
          sleep 30
          kubectl port-forward svc/nekocafe-reservation-green 18081:8080 -n nekocafe-prod &
          sleep 5
          curl -sf http://localhost:18081/healthz || (echo "Green 烟雾测试失败，保持 Blue" && exit 1)

          # 切换 Service 指向 Green
          kubectl patch svc nekocafe-reservation -n nekocafe-prod \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "蓝绿切换完成 ✅ - 当前 prod 指向 green ($TAG)"

          # 保留 Blue 5 分钟后降为 0 副本
          sleep 300
          kubectl scale deploy nekocafe-reservation-blue -n nekocafe-prod --replicas=0 || true

      - name: 通知发布完成
        if: always()
        run: |
          echo "部署状态: ${{ job.status }}"
          # TODO: 接入飞书/邮件通知

      - name: PoC 环境说明
        if: steps.check_kubeconfig.outputs.skip_deploy == 'true'
        run: |
          echo "✅ Prod 蓝绿部署已跳过（KUBECONFIG_PROD 未配置）"
          echo "📝 生产部署需配置真实 K8s 集群信息后方可执行"
