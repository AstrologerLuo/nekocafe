name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: ${{ github.repository_owner }}

jobs:
  # ===================================================================
  # JOB 1: Lint & 格式检查（并行）
  # ===================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [reservation, member]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (reservation)
        if: matrix.service == 'reservation'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/reservation/requirements-dev.txt

      - name: Lint Python (ruff + bandit)
        if: matrix.service == 'reservation'
        run: |
          cd services/reservation
          pip install ruff bandit
          ruff check src/ tests/
          bandit -r src/ -ll -s B104

      - name: Setup Node.js (member)
        if: matrix.service == 'member'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint Node.js (eslint + npm audit)
        if: matrix.service == 'member'
        run: |
          cd services/member
          npm ci
          npm run lint
          npm audit --audit-level=critical

  # ===================================================================
  # JOB 2: 单元测试（并行）
  # ===================================================================
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [reservation, member]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.service == 'reservation'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/reservation/requirements-dev.txt

      - name: Run Python tests
        if: matrix.service == 'reservation'
        run: |
          cd services/reservation
          pip install -r requirements-dev.txt
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
          echo "COVERAGE=$(python -c 'import xml.etree.ElementTree as ET; t=ET.parse(\"coverage.xml\").getroot(); print(round(float(t.get(\"line-rate\"))*100, 1))')" >> $GITHUB_ENV

      - name: Setup Node.js
        if: matrix.service == 'member'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Node.js tests
        if: matrix.service == 'member'
        run: |
          cd services/member
          npm ci
          npm test
          echo "COVERAGE=$(node -e 'const s=require("./coverage/coverage-summary.json");console.log(s.total.lines.pct)')" >> $GITHUB_ENV

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  # ===================================================================
  # JOB 3: Docker Build + Trivy 安全扫描（并行）
  # ===================================================================
  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - service: reservation
            context: ./services/reservation
          - service: member
            context: ./services/member
    outputs:
      reservation-image: ${{ steps.meta-reservation.outputs.tags }}
      member-image: ${{ steps.meta-member.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/nekocafe-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr

      - name: Build Docker image（多阶段，不推送）
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy 安全扫描
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service }}.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"  # HIGH/CRITICAL 漏洞时失败

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.service }}.sarif"

      - name: Get image size
        id: image-size
        run: |
          SIZE=$(docker image inspect ${{ steps.meta.outputs.tags }} --format='{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Push image（仅在 main 分支）
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment PR with quality metrics
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 CI 质量报告 - ${{ matrix.service }}
            
            | 指标 | 结果 |
            |------|------|
            | ✅ Lint | 通过 |
            | ✅ 单元测试 | 通过 |
            | 📊 覆盖率 | \`${{ env.COVERAGE }}%\` |
            | 🛡️ 安全扫描 | 无 HIGH/CRITICAL 漏洞 |
            | 🐳 镜像大小 | \`${{ steps.image-size.outputs.size }}\` |
            `
            })
